<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Showcase Card â€” Now Playing Style</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --rose:#f8b8cc;
  --crimson:#b41e46;
  --muted:#a98a92;
  --line:rgba(248,184,204,.22);
  --bone:#f4ece8;
}
html,body{
  min-height:100vh;
  background:#0c0608;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:"Hiragino Mincho ProN","Yu Mincho",Georgia,serif;
  -webkit-font-smoothing:antialiased;
}

/* â”€â”€ Showcase card wrapper (9:16 portrait) â”€â”€ */
.showcase{
  position:relative;
  width:390px;
  height:488px;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 40px 80px -20px rgba(0,0,0,.8);
}

/* TikTok-style blurred zoomed background */
.showcase-bg{
  position:absolute;
  inset:-40px;
  background-size:cover;
  background-position:center;
  filter:blur(28px) saturate(1.3) brightness(0.45);
  transform:scale(1.05);
}
.showcase-vignette{
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, transparent 30%, rgba(6,2,4,.55)),
    linear-gradient(180deg,rgba(6,2,4,.3) 0%,transparent 25%,transparent 75%,rgba(6,2,4,.3) 100%);
}

/* Centred card wrapper */
.card-wrap{
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  display:flex;
  align-items:center;
  justify-content:center;
}
.audio-card{
  position:relative;
  width:238px;
  height:333px;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 24px 60px -10px rgba(0,0,0,.7), 0 0 0 1.5px rgba(200,132,122,.5);
}
.audio-card > img.card-image{
  width:100%;height:100%;object-fit:cover;display:block;
}

.showcase-label{ display:none }

/* Shared animations */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes seek{0%{right:88%}100%{right:6%}}
@keyframes bar{
  0%  {height:var(--h0,4px)} 16%{height:var(--h1,18px)}
  33% {height:var(--h2,8px)} 50%{height:var(--h3,28px)}
  66% {height:var(--h4,12px)}83%{height:var(--h5,22px)}
  100%{height:var(--h0,4px)}
}
@keyframes mbar{0%,100%{height:3px}50%{height:var(--mh,9px)}}
@keyframes pulse{0%{width:120px;height:120px;opacity:.55}100%{width:260px;height:260px;opacity:0}}

/* Now Playing card specifics */
.np-card .card-scrim{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(8,3,6,.55),rgba(8,3,6,.05) 35%,rgba(8,3,6,.88));
}
.np-card .sakura-spin{
  position:absolute;top:12px;right:12px;
  width:50px;height:50px;
  animation:spin 5s linear infinite;
  filter:drop-shadow(0 0 5px rgba(248,184,204,.7));
}
.np-card .np-playing-label{
  position:absolute;top:18px;left:16px;
  font-family:ui-sans-serif,sans-serif;
  font-size:9px;letter-spacing:.3em;color:var(--rose);
}
.np-card .np-title-block{
  position:absolute;bottom:50px;left:16px;right:16px;
  font-size:15px;color:#fff;line-height:1.25;
}
.np-card .np-genre-label{
  display:block;font-family:ui-sans-serif,sans-serif;
  font-size:9px;letter-spacing:.2em;color:var(--rose);margin-top:4px;
}
/* Mini waveform */
.mini-wf{
  display:inline-flex;align-items:flex-end;gap:2px;
  height:13px;vertical-align:middle;
}
.mini-wf i{
  display:inline-block;width:2px;background:var(--rose);border-radius:1px;
  animation:mbar var(--dur,1s) ease-in-out infinite;
  animation-delay:var(--dl,0s);
}
.np-card .np-seek-bar{
  position:absolute;bottom:30px;left:16px;right:16px;
  height:3px;border-radius:3px;background:rgba(255,255,255,.18);overflow:hidden;
}
.np-card .np-time{
  position:absolute;bottom:15px;left:16px;right:16px;
  display:flex;justify-content:space-between;
  font-family:ui-monospace,monospace;font-size:9px;color:var(--muted);
}
</style>
</head>

  /* Build mini waveform bars */
  var mwf = document.getElementById('miniWf');
  var miniBars = [];
  var miniLevel = [];
  var NP_N = 9;
  for (var j = 0; j < NP_N; j++) {
    var mb = document.createElement('i');
    var mdur = (0.6 + Math.random() * 0.9).toFixed(2);
    var mh   = Math.round(4 + Math.random() * 8) + 'px';
    mb.style.cssText = '--dl:'+(j*0.07).toFixed(2)+'s;--dur:'+mdur+'s;--mh:'+mh+';';
    mwf.appendChild(mb); miniBars.push(mb); miniLevel.push(0);
  }

  // Same constants as waveform card
  var NP_GAIN=0.5, NP_TILT=6, NP_ATK=0.5, NP_DEC=0.24, NP_MAX_H=11;
  var npLastFrameT = 0;

  function npApplyFFT(freqBuf, sampleRate, fftSize, freqL, freqR) {
    var now = performance.now();
    var dt = npLastFrameT > 0 ? Math.min((now - npLastFrameT) / 1000, 0.1) : 1/60;
    npLastFrameT = now;
    var dtN = dt * 60;
    var atk = 1 - Math.pow(1 - NP_ATK, dtN);
    var dec = 1 - Math.pow(1 - NP_DEC, dtN);
    var stereo = !!(freqL && freqR);
    var binHz = sampleRate / fftSize;
    var minHz = 60, maxHz = 18000;
    for (var i = 0; i < NP_N; i++) {
      var fLo = minHz * Math.pow(maxHz / minHz, i / NP_N);
      var fHi = minHz * Math.pow(maxHz / minHz, (i + 1) / NP_N);
      var bLo = Math.max(0, Math.floor(fLo / binHz));
      var bHi = Math.min(freqBuf.length - 1, Math.ceil(fHi / binHz));
      var cnt = Math.max(1, bHi - bLo + 1);
      var pos = i / (NP_N - 1);
      var rms;
      if (stereo) {
        var sumL = 0, sumR = 0;
        for (var k = bLo; k <= bHi; k++) {
          var vL = freqL[k] / 255; sumL += vL * vL;
          var vR = freqR[k] / 255; sumR += vR * vR;
        }
        rms = Math.sqrt(sumL / cnt) * (1 - pos) + Math.sqrt(sumR / cnt) * pos;
      } else {
        var sum2 = 0;
        for (var k2 = bLo; k2 <= bHi; k2++) { var v2 = freqBuf[k2] / 255; sum2 += v2 * v2; }
        rms = Math.sqrt(sum2 / cnt);
      }
      var tg = Math.min(1, rms * (1 + NP_TILT * pos) * NP_GAIN);
      miniLevel[i] += (tg - miniLevel[i]) * (tg > miniLevel[i] ? atk : dec);
      var h = Math.max(2, Math.round(2 + miniLevel[i] * NP_MAX_H));
      miniBars[i].style.animation = 'none';
      miniBars[i].style.height = h + 'px';
    }
  }

  function npIdle(){ miniBars.forEach(function(mb){ mb.style.height=''; mb.style.animation=''; }); }

  var npTimeEnd = document.getElementById('npTimeEnd');
  function fmtTime(s) { var m=Math.floor(s/60),sec=Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }

      var freqBuf = new Uint8Array(d.freq);
      var freqL = d.freqL ? new Uint8Array(d.freqL) : null;
      var freqR = d.freqR ? new Uint8Array(d.freqR) : null;
      npApplyFFT(freqBuf, d.sampleRate, d.fftSize || 4096, freqL, freqR);
      if (d.duration && d.duration > 0 && d.currentTime != null) {
        var pct = Math.min(100, (d.currentTime / d.duration) * 100);
        if (npSeekFill) npSeekFill.style.width = pct + '%';
        if (npTimeStart) npTimeStart.textContent = fmtTime(d.currentTime);
        if (npTimeEnd) npTimeEnd.textContent = fmtTime(d.duration);
        var genreEl = document.getElementById('npGenreLabel');
        if (genreEl) {
          var mins = Math.ceil(d.duration / 60);
          var txt = genreEl.textContent || '';
          var dotIdx = txt.indexOf('·');
          var prefix = dotIdx >= 0 ? txt.substring(0, dotIdx + 1) : txt + ' ·';
          genreEl.textContent = prefix + ' ' + mins + ' MIN';
        }
      }
    }
    else if (d.type === 'audStop') { npIdle(); }
  });

  /* Mic self-start â€” active when loaded directly as OBS Browser Source */
  (function(){
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia) return;
    var BANDS=32;
    navigator.mediaDevices.getUserMedia({audio:true,video:false}).then(function(stream){
      var Ctx=window.AudioContext||window.webkitAudioContext;
      if(!Ctx) return;
      var ctx=new Ctx(), an=ctx.createAnalyser();
      an.fftSize=256; an.smoothingTimeConstant=0.82;
      ctx.createMediaStreamSource(stream).connect(an);
      var freq=new Uint8Array(an.frequencyBinCount);
      (function tick(){
        requestAnimationFrame(tick);
        an.getByteFrequencyData(freq);
        var per=Math.floor(freq.length/BANDS),s=[],sum=0;
        for(var b=0;b<BANDS;b++){
          var acc=0;
          for(var k=0;k<per;k++) acc+=freq[b*per+k];
          var v=acc/per/255; s.push(v); sum+=v;
        }
        npApply(s);
      })();
    }).catch(function(){});
  })();
</script>

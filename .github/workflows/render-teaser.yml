name: Render Audio Teaser

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Unique render job ID"
        required: true
      style:
        description: "Card style: Waveform | NowPlaying | SoundOrb"
        required: true
      config_json:
        description: "JSON string of card config"
        required: true
      audio_url:
        description: "Signed Supabase URL for the audio file"
        required: true
      image_url:
        description: "Signed Supabase URL for the cover image (empty = no image)"
        required: false
        default: ""
      duration_seconds:
        description: "Audio duration in seconds"
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: remotion/package.json

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libgbm1 libglib2.0-0 libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libpango-1.0-0 libcairo2 libasound2

      - name: Install Remotion dependencies
        working-directory: remotion
        run: npm ci

      - name: Build props file
        run: |
          cat > /tmp/render-props.json << 'PROPSEOF'
          {
            "style": "${{ inputs.style }}",
            "config": ${{ inputs.config_json }},
            "audioUrl": "${{ inputs.audio_url }}",
            "imageUrl": "${{ inputs.image_url }}",
            "durationSeconds": ${{ inputs.duration_seconds }}
          }
          PROPSEOF
          echo "Props written:"
          cat /tmp/render-props.json

      - name: Render video with Remotion
        working-directory: remotion
        run: |
          npx remotion render \
            src/index.ts \
            ${{ inputs.style }} \
            /tmp/render-output.mp4 \
            --props=/tmp/render-props.json \
            --codec=h264 \
            --crf=23 \
            --concurrency=2 \
            --log=verbose
        env:
          REMOTION_CHROMIUM_FLAGS: "--disable-dev-shm-usage"

      - name: Upload MP4 to Supabase Storage
        run: |
          OUTPUT_PATH="output/${{ inputs.job_id }}.mp4"
          curl -sf -X POST \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/render-jobs/${OUTPUT_PATH}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: video/mp4" \
            --data-binary @/tmp/render-output.mp4
          echo "Uploaded to Supabase: render-jobs/${OUTPUT_PATH}"

      - name: Write error file on failure
        if: failure()
        run: |
          ERROR_PATH="output/${{ inputs.job_id }}.error"
          echo "Render failed. Check GitHub Actions logs." | \
          curl -sf -X POST \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/render-jobs/${ERROR_PATH}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: text/plain" \
            --data-binary @-

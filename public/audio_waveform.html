<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Showcase Card — Waveform Style</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --rose:#f8b8cc;
  --crimson:#b41e46;
  --muted:#a98a92;
  --line:rgba(248,184,204,.22);
  --bone:#f4ece8;
}
html,body{
  min-height:100vh;
  background:#0c0608;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:"Hiragino Mincho ProN","Yu Mincho",Georgia,serif;
  -webkit-font-smoothing:antialiased;
}

/* ── Showcase card wrapper (9:16 portrait) ── */
.showcase{
  position:relative;
  width:390px;
  height:488px;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 40px 80px -20px rgba(0,0,0,.8);
}

/* TikTok-style blurred zoomed background */
.showcase-bg{
  position:absolute;
  inset:-40px;
  background-size:cover;
  background-position:center;
  filter:blur(28px) saturate(1.3) brightness(0.45);
  transform:scale(1.05);
}
.showcase-vignette{
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, transparent 30%, rgba(6,2,4,.55)),
    linear-gradient(180deg,rgba(6,2,4,.3) 0%,transparent 25%,transparent 75%,rgba(6,2,4,.3) 100%);
}

/* Centred card wrapper */
.card-wrap{
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  display:flex;
  align-items:center;
  justify-content:center;
}
.audio-card{
  position:relative;
  width:238px;
  height:333px;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 24px 60px -10px rgba(0,0,0,.7);
}
.audio-card > img.card-image{
  width:100%;height:100%;object-fit:cover;display:block;
}

.showcase-label{ display:none }

/* Shared animations */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes seek{0%{right:88%}100%{right:6%}}
@keyframes bar{
  0%  {height:var(--h0,4px)} 16%{height:var(--h1,18px)}
  33% {height:var(--h2,8px)} 50%{height:var(--h3,28px)}
  66% {height:var(--h4,12px)}83%{height:var(--h5,22px)}
  100%{height:var(--h0,4px)}
}
@keyframes mbar{0%,100%{height:3px}50%{height:var(--mh,9px)}}
@keyframes pulse{0%{width:120px;height:120px;opacity:.55}100%{width:260px;height:260px;opacity:0}}

/* Waveform card specifics */
.wf-card .card-veil{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(8,3,6,.05) 40%,rgba(8,3,6,.78));
}
.wf-card .wf-bars{
  position:absolute;bottom:52px;left:0;right:0;
  height:56px;display:flex;align-items:center;justify-content:center;gap:2px;
}
.wf-card .wf-bars i{
  width:3px;background:var(--rose);border-radius:2px;
  animation:bar var(--dur,1.1s) ease-in-out infinite;
  animation-delay:var(--dl,0s);
}
.wf-card .card-label{
  position:absolute;bottom:28px;left:0;right:0;
  text-align:center;font-family:ui-sans-serif,sans-serif;
  color:#fff;font-size:10px;letter-spacing:.34em;
}
.wf-card .card-sublabel{
  position:absolute;bottom:13px;left:0;right:0;
  text-align:center;font-family:ui-sans-serif,sans-serif;
  color:var(--rose);font-size:9px;letter-spacing:.28em;
}
</style>
</head>
<body>
<div class="showcase">
  <div class="showcase-bg" id="bg1"></div>
  <div class="showcase-vignette"></div>

  <div class="card-wrap">
    <div class="audio-card wf-card">
      <img class="card-image" src="" alt="">
      <div class="card-veil"></div>
      <div class="wf-bars" id="wfBars"></div>
      <!-- EDITABLE: card centre label -->
      <div class="card-label" id="cardLabel">RP AUDIO</div>
      <!-- EDITABLE: card sub-label (the ASMR line) -->
      <div class="card-sublabel" id="cardSublabel">— ASMR —</div>
    </div>
  </div>

  <!-- EDITABLE: bottom strip -->
  <div class="showcase-label">
    <div class="label-eyebrow" id="labelEyebrow">New Drop</div>
    <div class="label-title" id="labelTitle">Whisper &amp; Rain</div>
    <div class="label-meta" id="labelMeta">24 min · ASMR Roleplay · Exclusive</div>
  </div>
</div>

  // Set all card images and blurred backgrounds
  document.querySelectorAll('.card-image').forEach(function(el){ el.src = IMG; });
  document.querySelectorAll('.showcase-bg').forEach(function(el){
    el.style.backgroundImage = 'url(' + IMG + ')';
  });


  /* Build waveform bars */
  var wf = document.getElementById('wfBars');
  var bars = [];
  for (var i = 0; i < 40; i++) {
    var b = document.createElement('i');
    var dl = (i * 0.03).toFixed(2);
    var dur = (0.7 + Math.random() * 1.0).toFixed(2);
    var rh = function(){ return Math.round(3 + Math.random() * 24) + 'px'; };
    b.style.cssText = '--dl:'+dl+'s;--dur:'+dur+'s;--h0:'+rh()+';--h1:'+rh()+
      ';--h2:'+rh()+';--h3:'+rh()+';--h4:'+rh()+';--h5:'+rh()+';';
    wf.appendChild(b); bars.push(b);
  }

  /* Pre-analyzed waveform shape — set once on file load, bars scale to it */
  var waveform = [];

  function wfApply(amp){
    var nb=bars.length;
    bars.forEach(function(b,i){
      var base = waveform[i] || 0;
      var h = Math.max(3, Math.round(3 + base * amp * 50));
      b.style.animation='none';
      b.style.height=h+'px';
    });
  }
  function wfIdle(){ bars.forEach(function(b){ b.style.height=''; b.style.animation=''; }); }
  window.addEventListener('message', function(e){
    var d = e.data || {};
    if (d.type === 'waveform' && d.data) {
      waveform = d.data;
      // Update idle bar heights to reflect the audio's actual shape
      bars.forEach(function(b,i){
        var h = Math.round(3 + (waveform[i]||0) * 24);
        b.style.setProperty('--h0', h+'px');
        b.style.setProperty('--h1', Math.round(h*0.6)+'px');
        b.style.setProperty('--h2', Math.round(h*0.9)+'px');
        b.style.setProperty('--h3', Math.round(h*0.75)+'px');
        b.style.setProperty('--h4', Math.round(h*0.5)+'px');
        b.style.setProperty('--h5', Math.round(h*0.8)+'px');
      });
    }
    else if (d.type === 'aud' && d.amp !== undefined) { wfApply(d.amp); }
    else if (d.type === 'audStop') { wfIdle(); }
  });

  /* Mic self-start — active when loaded directly as OBS Browser Source */
  (function(){
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia) return;
    var BANDS=32;
    navigator.mediaDevices.getUserMedia({audio:true,video:false}).then(function(stream){
      var Ctx=window.AudioContext||window.webkitAudioContext;
      if(!Ctx) return;
      var ctx=new Ctx(), an=ctx.createAnalyser();
      an.fftSize=256; an.smoothingTimeConstant=0.82;
      ctx.createMediaStreamSource(stream).connect(an);
      var freq=new Uint8Array(an.frequencyBinCount);
      (function tick(){
        requestAnimationFrame(tick);
        an.getByteFrequencyData(freq);
        var per=Math.floor(freq.length/BANDS),s=[],sum=0;
        for(var b=0;b<BANDS;b++){
          var acc=0;
          for(var k=0;k<per;k++) acc+=freq[b*per+k];
          var v=acc/per/255; s.push(v); sum+=v;
        }
        wfApply(s);
      })();
    }).catch(function(){/* mic denied — CSS idle animation stays active */});
  })();

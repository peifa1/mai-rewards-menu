<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Showcase Card — Sound Orb Style</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --rose:#f8b8cc;
  --crimson:#b41e46;
  --muted:#a98a92;
  --line:rgba(248,184,204,.22);
  --bone:#f4ece8;
}
html,body{
  min-height:100vh;
  background:#0c0608;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:"Hiragino Mincho ProN","Yu Mincho",Georgia,serif;
  -webkit-font-smoothing:antialiased;
}

/* ── Showcase card wrapper (9:16 portrait) ── */
.showcase{
  position:relative;
  width:390px;
  height:693px;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 14px 29px -7px rgba(0,0,0,.8);
}

/* TikTok-style blurred zoomed background */
.showcase-bg{
  position:absolute;
  inset:-14px;
  background-size:cover;
  background-position:center;
  filter:blur(10px) saturate(1.3) brightness(0.45);
  transform:scale(1.05);
}
.showcase-vignette{
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, transparent 30%, rgba(6,2,4,.55)),
    linear-gradient(180deg,rgba(6,2,4,.3) 0%,transparent 25%,transparent 75%,rgba(6,2,4,.3) 100%);
}

/* Centred card wrapper */
.card-wrap{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}
.audio-card{
  position:relative;
  width:210px;
  height:294px;
  border-radius:10px;
  overflow:visible;
  box-shadow:none;
  background:transparent;
}
.audio-card > img.card-image{
  width:100%;height:100%;object-fit:cover;display:block;
}

/* Bottom label strip */
.showcase-label{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:24px 28px 28px;
  background:linear-gradient(0deg, rgba(6,2,4,.85) 60%, transparent);
  color:#fff;
}
.showcase-label .label-eyebrow{
  font-family:ui-sans-serif,sans-serif;
  font-size:10px;letter-spacing:.4em;text-transform:uppercase;
  color:var(--rose);opacity:.8;margin-bottom:5px;
}
.showcase-label .label-title{
  font-size:20px;font-weight:600;line-height:1.2;
}
.showcase-label .label-meta{
  font-family:ui-sans-serif,sans-serif;
  font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:.08em;
}

/* Shared animations */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes seek{0%{right:88%}100%{right:6%}}
@keyframes bar{
  0%  {height:var(--h0,4px)} 16%{height:var(--h1,18px)}
  33% {height:var(--h2,8px)} 50%{height:var(--h3,28px)}
  66% {height:var(--h4,12px)}83%{height:var(--h5,22px)}
  100%{height:var(--h0,4px)}
}
@keyframes mbar{0%,100%{height:3px}50%{height:var(--mh,9px)}}
@keyframes pulse{0%{width:120px;height:120px;opacity:.55}100%{width:260px;height:260px;opacity:0}}

/* Sound Orb card specifics */
.orb-card{
  background:transparent;
  display:grid;place-items:center;
}
.orb-card .pulse-ring{
  position:absolute;top:50%;left:50%;border-radius:50%;
  border:1px solid var(--rose);
  transform:translate(-50%,-50%);
  animation:pulse 3.2s ease-out infinite;opacity:0;
}
.orb-card .pulse-ring:nth-child(2){animation-delay:1.05s}
.orb-card .pulse-ring:nth-child(3){animation-delay:2.1s}
.orb-card .orb-portrait{
  position:relative;width:120px;height:120px;border-radius:50%;overflow:hidden;
  border:none;
  box-shadow:0 0 29px rgba(248,184,204,.35);z-index:2;
}
.orb-card .orb-portrait img{width:100%;height:100%;object-fit:cover;}
.orb-card .orb-caption{
  position:absolute;bottom:100px;left:0;right:0;text-align:center;
  font-family:ui-sans-serif,sans-serif;
  font-size:10px;letter-spacing:.34em;color:var(--rose);
}
.orb-card .orb-caption b{color:#fff;}
</style>
</head>
<body>
<div class="showcase">
  <div class="showcase-bg" id="bg5"></div>
  <div class="showcase-vignette"></div>

  <div class="card-wrap">
    <div class="audio-card orb-card">
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="orb-portrait">
        <img class="card-image" src="" alt="">
      </div>
      <!-- EDITABLE: caption beneath the orb (the · ASMR · line) -->
      <div class="orb-caption" id="orbCaption">
        <b>·</b> <span id="orbAsmrLabel">ASMR</span> <b>·</b>
      </div>
    </div>
  </div>

  <!-- EDITABLE: bottom strip -->
  <div class="showcase-label">
    <div class="label-eyebrow" id="labelEyebrow">New Drop</div>
    <div class="label-title" id="labelTitle">Whisper &amp; Rain</div>
    <div class="label-meta" id="labelMeta">24 min · ASMR Roleplay · Exclusive</div>
  </div>
</div>

name: Render Audio Teaser

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Unique render job ID"
        required: true
      style:
        description: "Card style: Waveform | NowPlaying | SoundOrb"
        required: true
      config_json:
        description: "JSON string of card config"
        required: true
      audio_url:
        description: "Signed Supabase URL for the audio file"
        required: true
      image_url:
        description: "Signed Supabase URL for the cover image (empty = no image)"
        required: false
        default: ""
      duration_seconds:
        description: "Audio duration in seconds"
        required: true
      callback_url:
        description: "Vercel URL to POST the finished MP4 to"
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: remotion/package.json

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libgbm1 libglib2.0-0 libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libpango-1.0-0 libcairo2 libasound2t64

      - name: Install Remotion dependencies
        working-directory: remotion
        run: npm ci

      - name: Build props file
        run: |
          cat > /tmp/render-props.json << PROPSEOF
          {
            "style": "${{ inputs.style }}",
            "config": ${{ inputs.config_json }},
            "audioUrl": "${{ inputs.audio_url }}",
            "imageUrl": "${{ inputs.image_url }}",
            "durationSeconds": ${{ inputs.duration_seconds }}
          }
          PROPSEOF

      - name: Render video with Remotion
        working-directory: remotion
        run: |
          npx remotion render \
            src/index.ts \
            ${{ inputs.style }} \
            /tmp/render-output.mp4 \
            --props=/tmp/render-props.json \
            --codec=h264 \
            --crf=23 \
            --concurrency=2
        env:
          REMOTION_CHROMIUM_FLAGS: "--disable-dev-shm-usage"

      - name: Send MP4 to callback
        run: |
          curl -sfL -X POST "${{ inputs.callback_url }}" \
            -H "X-Render-Secret: ${{ secrets.RENDER_CALLBACK_SECRET }}" \
            -H "X-Job-Id: ${{ inputs.job_id }}" \
            -H "Content-Type: video/mp4" \
            --data-binary @/tmp/render-output.mp4

      - name: Report failure to callback
        if: failure()
        run: |
          curl -sL -X POST "${{ inputs.callback_url }}" \
            -H "X-Render-Secret: ${{ secrets.RENDER_CALLBACK_SECRET }}" \
            -H "X-Job-Id: ${{ inputs.job_id }}" \
            -H "Content-Type: text/plain" \
            -d "Render failed — check GitHub Actions run $GITHUB_RUN_ID"

<script>
const easeOut   = p=>1-(1-p)**3;
const easeIn    = p=>p*p*p;
const easeBack  = p=>{const c=1.70158,c3=c+1;return 1+c3*(p-1)**3+c*(p-1)**2;};
const easeInOut = p=>p<.5?4*p**3:1-(-2*p+2)**3/2;
const sleep     = ms=>new Promise(r=>setTimeout(r,ms));
function animate(ms,fn){return new Promise(res=>{const s=performance.now();(function f(n){const p=Math.min(1,(n-s)/ms);fn(p);p<1?requestAnimationFrame(f):res();})(s);});}

const img = document.getElementById('card-wrap');
const sakTL = document.getElementById('sakura-tl');
const sakBR = document.getElementById('sakura-br');

let floatT=0, lastNow=null, floatOn=false, gScale=0;
let sakRot=0;
const SWAY=5, SWAY_S=0.55, BOB=4, BOB_S=0.75;

function applyImg(){
  const sway=SWAY*Math.sin(floatT*SWAY_S), bob=BOB*Math.sin(floatT*BOB_S);
  img.style.transform=`translate(0px,${bob}px) scale(${gScale}) rotate(${sway}deg)`;
  // sway velocity = derivative of sin = cos; spin sakuras in the direction the card is moving
  const swayVel = Math.cos(floatT*SWAY_S);  // +1 moving one way, -1 the other
  sakTL.style.transform = `rotate(${sakRot}deg)`;
  sakBR.style.transform = `rotate(${-sakRot*0.8}deg)`;
}
function floatTick(now){
  const dt=lastNow?now-lastNow:16; lastNow=now;
  floatT+=dt*0.001;
  const swayVel = Math.cos(floatT*SWAY_S);
  sakRot += swayVel * dt * 0.06;   // accumulate rotation, sign follows sway direction
  applyImg();
  if(floatOn) requestAnimationFrame(floatTick);
}

async function enter(){
  gScale=0; applyImg();
  await animate(560, p=>{ gScale=easeBack(p); applyImg(); });
  gScale=1; applyImg();
}

async function exit(){
  floatOn=false;
  await animate(450, p=>{ gScale=1-easeIn(p); applyImg(); });
  gScale=0; applyImg();
}

async function loop(){
  while(true){
    gScale=0; floatOn=false; lastNow=null;
    await enter();
    floatOn=true; requestAnimationFrame(floatTick);
    await sleep(6000);
    await exit();
    await sleep(2000);
  }
}
loop();
</script>
